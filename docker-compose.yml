services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: insightrag-postgres
    environment:
      POSTGRES_USER: insightrag
      POSTGRES_PASSWORD: insightrag
      POSTGRES_DB: insightrag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insightrag -d insightrag"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
